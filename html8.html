 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
           perspective: none;
            background-color: aqua;
            color:black;
            border-radius: 21px;
            margin: 30px;
            padding: 30px;
            justify-content: center;
            animation: both;
        }
        #main{
            height: 500px;
            position:  relative ;
            width: 300px;
            margin: 40px auto;
            
            transform-style: preserve-3d ;
            transition: 3s;
             box-shadow: rgba(13, 6, 3, 0.25) 0px 54px 55px, rgba(0, 0, 0, 0.12) 0px -12px 30px, rgba(0, 0, 0, 0.12) 0px 4px 6px, rgba(0, 0, 0, 0.17) 0px 12px 13px, rgba(0, 0, 0, 0.09) 0px -3px 5px; 
        }
        #main:hover{
            transform: rotateY(360deg);
        }
       #card_a{
        height: 100%;
        position: absolute;
        width: 100%;
        z-index: 8;
        backface-visibility: hidden;
        border-radius: 21px;
        

        }
        img{
            height: 100%;
            width: 100%;
        }
        #card_b{
            height: 50%;
            width: 100%;
            z-index: 3;
            transform: rotateY(180deg);
            position: absolute;
            background-color: rgb(198, 199, 188);
            font-size: 25px;
            border-radius: 21%;
    
        }
    </style>

</head>
